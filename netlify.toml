# Netlify config — the Next.js app lives in the frontend/ subfolder.
# The @netlify/plugin-nextjs runtime manages the publish dir + SSR; do NOT set
# `publish` manually or Netlify serves raw build files and 404s.
[build]
  base = "frontend"
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"
